id: highway-minor-casing
type: line
source: geolonia
source-layer: transportation
minzoom: 13
filter:
  - all
  - - ==
    - $type
    - LineString
  - - '!='
    - brunnel
    - tunnel
  - - in
    - class
    - minor
    - service
    - track
layout:
  line-cap: butt
  line-join: miter
paint:
  line-color: '#705838'
  line-width:
    - interpolate
    - - linear
    - - zoom
    - 13.5
    - 0
    - 14
    - 3
    - 16
    - 8
    - 20
    - 18
