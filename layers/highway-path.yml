id: highway-path
type: line
source: geolonia
source-layer: transportation
minzoom: 14
filter:
  - all
  - - ==
    - $type
    - LineString
  - - '!in'
    - brunnel
    - bridge
    - tunnel
  - - ==
    - class
    - path
layout:
  line-cap: butt
  line-join: bevel
paint:
  line-color: '#c0b080'
  line-width:
    base: 3
    stops:
      - - 14
        - 2
      - - 15
        - 3
      - - 17
        - 4
